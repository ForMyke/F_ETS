name: etsAndroid
description: Android Clean Architecture
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Service locator
  get_it: ^9.2.0
  # Bloc for state management
  flutter_bloc: ^9.1.1
  # Value equality
  equatable: ^2.0.8
  # Functional programming thingies
  dartz: ^0.10.1
  # Remote API
  http: ^1.6.0
  # Local cache
  shared_preferences: ^2.5.4
  # Geolocation
  url_launcher: ^6.3.2
  flutter_animate: ^4.5.2
  pdf: ^3.11.1
  printing: ^5.13.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Para el backend
  supabase_flutter: ^2.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.6.3
  # Warnings
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
